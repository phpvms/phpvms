name: Docker image smoke

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "compose.deploy.yml"
      - "resources/docker/**"
      - "composer.json"
      - "composer.lock"
      - "config/octane.php"
      - ".github/workflows/docker-smoke.yml"

# Exercises the production image in both runtime modes (Octane on by default,
# classic via PHPVMS_OCTANE_ENABLED=false). Checks for:
#   - The image actually builds.
#   - The container reaches a healthy state and serves /.
#   - Sequential requests on the same container return stable response sizes,
#     a quick heuristic for nav-list accumulation or other per-request state
#     leaks under Octane worker mode.
#
# Not a full integration test — the database is SQLite in-memory, no migrations
# are run, and any route that requires DB will fail. The bar here is "the
# entrypoint hook doesn't crash and FrankenPHP serves something."

concurrency:
  group: docker-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: phpvms-smoke:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image
        run: docker save phpvms-smoke:latest -o /tmp/phpvms-smoke.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: phpvms-smoke-image
          path: /tmp/phpvms-smoke.tar
          retention-days: 1

  smoke-octane:
    name: Smoke (Octane default)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: phpvms-smoke-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/phpvms-smoke.tar

      - name: Run container (Octane on by default)
        run: |
          APP_KEY="base64:$(openssl rand -base64 32)"
          docker run -d --name phpvms-smoke \
            -p 8080:80 \
            -e APP_KEY="$APP_KEY" \
            -e APP_ENV=production \
            -e APP_DEBUG=false \
            -e DB_CONNECTION=sqlite \
            -e DB_DATABASE=:memory: \
            phpvms-smoke:latest

      - name: Wait for HTTP
        run: |
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null -w "%{http_code}" http://localhost:8080/ | grep -Eq "^[23]"; then
              echo "Container responsive after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Container did not become responsive"
          docker logs phpvms-smoke
          exit 1

      - name: Sequential request stability (3 hits, response sizes must match)
        run: |
          set -e
          sizes=""
          for i in 1 2 3; do
            sz=$(curl -fsS http://localhost:8080/ | wc -c)
            sizes="$sizes $sz"
          done
          echo "Response sizes:$sizes"
          uniq_count=$(echo $sizes | tr ' ' '\n' | sort -u | wc -l)
          if [ "$uniq_count" -ne 1 ]; then
            echo "Response sizes differed across sequential requests — possible state leak."
            docker logs phpvms-smoke
            exit 1
          fi

      - name: Verify Octane is the foreground process
        run: |
          docker exec phpvms-smoke sh -c 'ps -ef | grep -q "octane:frankenphp"' \
            || { echo "octane:frankenphp not running"; docker exec phpvms-smoke ps -ef; exit 1; }

      - name: Container logs (on failure)
        if: failure()
        run: docker logs phpvms-smoke

      - name: Tear down
        if: always()
        run: docker rm -f phpvms-smoke || true

  smoke-classic:
    name: Smoke (PHPVMS_OCTANE_ENABLED=false)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: phpvms-smoke-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/phpvms-smoke.tar

      - name: Run container (classic mode)
        run: |
          APP_KEY="base64:$(openssl rand -base64 32)"
          docker run -d --name phpvms-smoke-classic \
            -p 8081:80 \
            -e APP_KEY="$APP_KEY" \
            -e APP_ENV=production \
            -e APP_DEBUG=false \
            -e DB_CONNECTION=sqlite \
            -e DB_DATABASE=:memory: \
            -e PHPVMS_OCTANE_ENABLED=false \
            phpvms-smoke:latest

      - name: Wait for HTTP
        run: |
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null -w "%{http_code}" http://localhost:8081/ | grep -Eq "^[23]"; then
              echo "Container responsive after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Container did not become responsive"
          docker logs phpvms-smoke-classic
          exit 1

      - name: Sequential request stability (3 hits, response sizes must match)
        run: |
          set -e
          sizes=""
          for i in 1 2 3; do
            sz=$(curl -fsS http://localhost:8081/ | wc -c)
            sizes="$sizes $sz"
          done
          echo "Response sizes:$sizes"
          uniq_count=$(echo $sizes | tr ' ' '\n' | sort -u | wc -l)
          if [ "$uniq_count" -ne 1 ]; then
            echo "Response sizes differed across sequential requests."
            docker logs phpvms-smoke-classic
            exit 1
          fi

      - name: Verify Octane is NOT running (classic mode)
        run: |
          if docker exec phpvms-smoke-classic sh -c 'ps -ef | grep -q "[o]ctane:frankenphp"'; then
            echo "octane:frankenphp is running but PHPVMS_OCTANE_ENABLED=false — escape hatch broken"
            docker exec phpvms-smoke-classic ps -ef
            exit 1
          fi

      - name: Container logs (on failure)
        if: failure()
        run: docker logs phpvms-smoke-classic

      - name: Tear down
        if: always()
        run: docker rm -f phpvms-smoke-classic || true
