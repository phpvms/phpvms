# Production reference Compose stack for phpVMS.
#
# The `app` service runs the FrankenPHP image with Laravel Octane worker
# mode enabled via a `command:` override (the upstream-documented way to
# launch Octane with serversideup/php:8.5-frankenphp). Octane keeps the
# framework booted across requests, which materially helps Filament /
# Livewire-heavy admin paths.
#
# To fall back to classic FrankenPHP + PHP-worker mode (matches the prior
# PHP-FPM request semantics — slower but bulletproof if an Octane bug hits):
# delete the `command:` line below and recreate the `app` container. No
# rebuild required.
#
# This file builds the image locally from the repository's Dockerfile and
# tags it as `phpvms:local`. The `task` and `queue` services reuse the
# same tag, so the build happens once. To deploy against the published
# image instead (CI-built, signed), replace `image: phpvms:local` with
# `image: ghcr.io/phpvms/phpvms:main` and delete the `build:` block on
# the `app` service.
#
# For local development, see `compose.sail.yml` (Laravel Sail).
services:
  app:
    container_name: phpvms-app
    user: "${WWWUSER:-1000}:${WWWGROUP:-1000}"
    image: phpvms:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WWWUSER: "${WWWUSER:-1000}"
        WWWGROUP: "${WWWGROUP:-1000}"
    hostname: app
    restart: unless-stopped
    # Delete this line to revert to classic FrankenPHP + PHP-worker mode.
    command:
      [
        "php",
        "/var/www/html/artisan",
        "octane:start",
        "--server=frankenphp",
        "--host=0.0.0.0",
        "--port=8080",
        "--workers=auto",
        "--max-requests=500",
      ]
    ports:
      # The image binds to 8080/8443 internally (unprivileged); host ports
      # 80/443 are mapped at the Compose layer.
      - "${FORWARD_HTTP_PORT:-80}:8080"
      - "${FORWARD_HTTPS_PORT:-443}:8443"
    environment:
      # Laravel automations run by the image entrypoint (config/route/view/event
      # caches + storage:link + migrations). See
      # https://serversideup.net/open-source/docker-php/docs/laravel-automations/
      AUTORUN_ENABLED: "true"
      # OPcache tuned for Octane: code is loaded once and stays in memory, so
      # disable timestamp revalidation (deploys replace the container) and
      # raise the file cap to cover Filament + module trees.
      PHP_OPCACHE_ENABLE: "1"
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: "0"
      PHP_OPCACHE_MAX_ACCELERATED_FILES: "20000"
      PHP_OPCACHE_INTERNED_STRINGS_BUFFER: "16"
      PHP_OPCACHE_JIT: "tracing"
      PHP_OPCACHE_JIT_BUFFER_SIZE: "64M"
      # Caddy (bundled in FrankenPHP) writes its instance ID, ACME certs, and
      # autosaved admin config under $XDG_DATA_HOME/caddy + $XDG_CONFIG_HOME/caddy.
      # The image's www-data user has no $HOME with those defaults, so Caddy
      # logs "could not clean default/global storage" + "unable to autosave
      # config" on every boot. Point both at the storage volume so the data
      # is writable AND persists across container recreations — important if
      # SERVER_NAME is later set and Caddy starts managing TLS certs.
      XDG_DATA_HOME: "/var/www/html/storage"
      XDG_CONFIG_HOME: "/var/www/html/storage"
    env_file: .env
    volumes:
      - ./modules:/var/www/html/modules:ro
      - phpvms_uploads:/var/www/html/public/uploads:rw
      - phpvms_storage:/var/www/html/storage:rw
    depends_on:
      - mariadb
      - redis
    healthcheck:
      # Native healthcheck script for Octane shipped by serversideup/php.
      test: ["CMD", "healthcheck-octane"]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - phpvms

  task:
    container_name: phpvms-task
    user: "${WWWUSER:-1000}:${WWWGROUP:-1000}"
    image: phpvms:local
    restart: unless-stopped
    command: ["php", "/var/www/html/artisan", "schedule:work"]
    environment:
      PHP_OPCACHE_ENABLE: "1"
    healthcheck:
      # This is our native healthcheck script for the scheduler
      test: ["CMD", "healthcheck-schedule"]
      start_period: 10s
    env_file: .env
    volumes:
      - ./modules:/var/www/html/modules:ro
      - phpvms_uploads:/var/www/html/public/uploads:rw
      - phpvms_storage:/var/www/html/storage:rw
    networks:
      - phpvms

  queue:
    container_name: phpvms-queue
    user: "${WWWUSER:-1000}:${WWWGROUP:-1000}"
    image: phpvms:local
    restart: unless-stopped
    command: ["php", "/var/www/html/artisan", "queue:work", "--tries=3"]
    environment:
      PHP_OPCACHE_ENABLE: "1"
    healthcheck:
      # This is our native healthcheck script for the queue
      test: ["CMD", "healthcheck-queue"]
      start_period: 10s
    env_file: .env
    volumes:
      - ./modules:/var/www/html/modules:ro
      - phpvms_uploads:/var/www/html/public/uploads:rw
      - phpvms_storage:/var/www/html/storage:rw
    networks:
      - phpvms

  mariadb:
    container_name: phpvms-mariadb
    image: mariadb:11
    restart: unless-stopped
    # If someone need to access db from the outside
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      - phpvms
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    container_name: phpvms-redis
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis:/data
    networks:
      - phpvms
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

volumes:
  mariadb:
  phpvms_storage:
  phpvms_uploads:
  redis:

networks:
  phpvms:
    driver: bridge
